name: Auto Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ 13.49.0.32 }}
          username: ubuntu
          key: ${{ ssh-rsa  Myfirstkey }}

          script: |
            cd /var/www/myapp
            git pull origin main
            sudo systemctl restart nginx
